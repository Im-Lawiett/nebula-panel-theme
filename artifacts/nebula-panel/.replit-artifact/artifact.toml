kind = "web"
previewPath = "/"
title = "Nebula Panel Theme"
version = "1.0.0"
id = "artifacts/nebula-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18246

[services.development]
run = "pnpm --filter @workspace/nebula-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nebula-panel", "run", "build" ]
publicDir = "artifacts/nebula-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18246"
BASE_PATH = "/"
