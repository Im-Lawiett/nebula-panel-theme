openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nebula Panel Theme API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: servers
    description: Server management
  - name: files
    description: File management
  - name: chat
    description: Public chat
  - name: admin
    description: Admin operations
  - name: nodes
    description: Node management
  - name: users
    description: User management
  - name: nests
    description: Nest and egg management
  - name: locations
    description: Location management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # === SERVERS ===
  /servers:
    get:
      operationId: listServers
      tags: [servers]
      summary: List user servers
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Server"
  /servers/{id}:
    get:
      operationId: getServer
      tags: [servers]
      summary: Get server details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"

  # === FILES ===
  /servers/{id}/files:
    get:
      operationId: listServerFiles
      tags: [files]
      summary: List files in root directory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileEntry"
  /servers/{id}/files/dir/{dir}:
    get:
      operationId: listServerFilesInDir
      tags: [files]
      summary: List files in a specific directory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: dir
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileEntry"
  /servers/{id}/files/rename:
    post:
      operationId: renameFile
      tags: [files]
      summary: Rename a file or directory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileRenameInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /servers/{id}/files/delete:
    post:
      operationId: deleteFile
      tags: [files]
      summary: Delete files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDeleteInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /servers/{id}/files/compress:
    post:
      operationId: compressFiles
      tags: [files]
      summary: Compress files into a zip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileCompressInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /servers/{id}/files/decompress:
    post:
      operationId: decompressFile
      tags: [files]
      summary: Decompress a zip file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDecompressInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /servers/{id}/files/chmod:
    post:
      operationId: chmodFile
      tags: [files]
      summary: Change file permissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileChmodInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # === CHAT ===
  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List public chat messages (latest 50)
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  # === ADMIN: OVERVIEW ===
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # === ADMIN: NODES ===
  /admin/nodes:
    get:
      operationId: listNodes
      tags: [nodes]
      summary: List nodes
      responses:
        "200":
          description: Nodes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"
    post:
      operationId: createNode
      tags: [nodes]
      summary: Create a node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
  /admin/nodes/{id}:
    get:
      operationId: getNode
      tags: [nodes]
      summary: Get node details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
    patch:
      operationId: updateNode
      tags: [nodes]
      summary: Update a node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeUpdate"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
    delete:
      operationId: deleteNode
      tags: [nodes]
      summary: Delete a node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === ADMIN: USERS ===
  /admin/users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /admin/users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === ADMIN: SERVERS ===
  /admin/servers:
    get:
      operationId: listAdminServers
      tags: [admin]
      summary: List all servers (admin)
      responses:
        "200":
          description: All servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminServer"

  # === ADMIN: LOCATIONS ===
  /admin/locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List locations
      responses:
        "200":
          description: Locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"

  # === ADMIN: NESTS ===
  /admin/nests:
    get:
      operationId: listNests
      tags: [nests]
      summary: List nests (egg groups)
      responses:
        "200":
          description: Nests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Nest"
  /admin/nests/{nestId}/eggs:
    get:
      operationId: listEggs
      tags: [nests]
      summary: List eggs in a nest
      parameters:
        - name: nestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Eggs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Egg"

  # === ADMIN: APPLICATION API ===
  /admin/api-keys:
    get:
      operationId: listApiKeys
      tags: [admin]
      summary: List application API keys
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: createApiKey
      tags: [admin]
      summary: Create application API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "201":
          description: Created key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
  /admin/api-keys/{id}:
    delete:
      operationId: deleteApiKey
      tags: [admin]
      summary: Delete API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Server:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [running, stopped, starting, stopping, offline]
        node:
          type: string
        egg:
          type: string
        cpuUsage:
          type: number
        memoryUsage:
          type: integer
        memoryLimit:
          type: integer
        diskUsage:
          type: integer
        diskLimit:
          type: integer
        ip:
          type: string
        port:
          type: integer
        uuid:
          type: string
      required: [id, name, status, node, egg, cpuUsage, memoryUsage, memoryLimit, diskUsage, diskLimit, ip, port, uuid]

    AdminServer:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
        name:
          type: string
        owner:
          type: string
        node:
          type: string
        egg:
          type: string
        cpuLimit:
          type: integer
        memoryLimit:
          type: integer
        diskLimit:
          type: integer
        status:
          type: string
      required: [id, uuid, name, owner, node, egg, cpuLimit, memoryLimit, diskLimit, status]

    FileEntry:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        isDirectory:
          type: boolean
        modified:
          type: string
        permissions:
          type: string
        mimetype:
          type: ["string", "null"]
      required: [name, size, isDirectory, modified, permissions]

    FileRenameInput:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
      required: [from, to]

    FileDeleteInput:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
      required: [files]

    FileCompressInput:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
        name:
          type: string
      required: [files, name]

    FileDecompressInput:
      type: object
      properties:
        file:
          type: string
      required: [file]

    FileChmodInput:
      type: object
      properties:
        file:
          type: string
        mode:
          type: string
      required: [file, mode]

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: ["string", "null"]
        content:
          type: string
        attachmentUrl:
          type: ["string", "null"]
        attachmentType:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, username, content, createdAt]

    ChatMessageInput:
      type: object
      properties:
        username:
          type: string
        content:
          type: string
        attachmentUrl:
          type: ["string", "null"]
        attachmentType:
          type: ["string", "null"]
      required: [username, content]

    AdminStats:
      type: object
      properties:
        totalServers:
          type: integer
        activeServers:
          type: integer
        totalUsers:
          type: integer
        totalNodes:
          type: integer
        totalRam:
          type: integer
        usedRam:
          type: integer
        totalDisk:
          type: integer
        usedDisk:
          type: integer
      required: [totalServers, activeServers, totalUsers, totalNodes, totalRam, usedRam, totalDisk, usedDisk]

    Node:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        fqdn:
          type: string
        location:
          type: string
        totalMemory:
          type: integer
        usedMemory:
          type: integer
        totalDisk:
          type: integer
        usedDisk:
          type: integer
        serverCount:
          type: integer
        status:
          type: string
          enum: [online, offline, maintenance]
        daemonVersion:
          type: string
      required: [id, name, fqdn, location, totalMemory, usedMemory, totalDisk, usedDisk, serverCount, status, daemonVersion]

    NodeInput:
      type: object
      properties:
        name:
          type: string
        fqdn:
          type: string
        locationId:
          type: integer
        memory:
          type: integer
        memoryOverallocate:
          type: integer
        disk:
          type: integer
        diskOverallocate:
          type: integer
        daemonBase:
          type: string
        daemonSftp:
          type: integer
        daemonListen:
          type: integer
        behindProxy:
          type: boolean
        maintenanceMode:
          type: boolean
      required: [name, fqdn, locationId, memory, disk]

    NodeUpdate:
      type: object
      properties:
        name:
          type: string
        fqdn:
          type: string
        memory:
          type: integer
        disk:
          type: integer
        maintenanceMode:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string
        serverCount:
          type: integer
      required: [id, username, email, firstName, lastName, isAdmin, createdAt, serverCount]

    UserInput:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
        isAdmin:
          type: boolean
      required: [username, email, firstName, lastName, password]

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isAdmin:
          type: boolean

    Location:
      type: object
      properties:
        id:
          type: integer
        short:
          type: string
        long:
          type: string
        nodeCount:
          type: integer
        serverCount:
          type: integer
      required: [id, short, long, nodeCount, serverCount]

    LocationInput:
      type: object
      properties:
        short:
          type: string
        long:
          type: string
      required: [short, long]

    Nest:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        eggCount:
          type: integer
      required: [id, name, eggCount]

    Egg:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        dockerImage:
          type: string
        serverCount:
          type: integer
      required: [id, name, dockerImage, serverCount]

    ApiKey:
      type: object
      properties:
        id:
          type: integer
        identifier:
          type: string
        description:
          type: string
        allowedIps:
          type: array
          items:
            type: string
        lastUsedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, identifier, description, allowedIps, createdAt]

    ApiKeyInput:
      type: object
      properties:
        description:
          type: string
        allowedIps:
          type: array
          items:
            type: string
      required: [description]
